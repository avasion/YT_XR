<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XR Connections Graph — Search Engine</title>
  <link rel="stylesheet" href="style.css">

  <!-- 3d-force-graph bundles Three.js + d3-force-3d. Pinned versions so the
       app is reproducible for the whole class. Served from esm.sh as modules. -->
  <!-- 3d-force-graph bundles its own three (incl. camera controls). We also load
       a standalone three for our thumbnail sprites. Pinned for reproducibility. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.160.0",
      "3d-force-graph": "https://esm.sh/3d-force-graph@1.73.4"
    }
  }
  </script>
</head>
<body>
  <div id="graph-container"></div>

  <header class="topbar">
    <h1>XR&nbsp;<span>Connections</span></h1>
    <button id="resetBtn" class="reset-btn">Reset view</button>
  </header>

  <section class="search-panel">
    <input type="text" id="searchInput" class="search-bar"
           placeholder="Search creators, videos, or #hashtags…" autocomplete="off">
    <div id="searchResults" class="search-results"></div>
    <div class="chips-label">Popular hashtags</div>
    <div id="hashtagChips" class="chips"></div>
    <div id="dataBanner" class="data-banner"></div>
  </section>

  <aside class="info-panel">
    <div id="nodeInfo" class="node-info"></div>
  </aside>

  <div id="legend" class="legend"></div>

  <div class="controls">
    <p class="controls-text">Drag: rotate · Scroll: zoom · Click hub: open its videos · Click video: play</p>
  </div>

  <!-- Playable video overlay (real YouTube player, layered over the 3D scene) -->
  <div id="player-overlay" class="player-overlay" hidden>
    <div class="player-box">
      <div class="player-head">
        <span id="playerTitle" class="player-title"></span>
        <button id="playerClose" class="player-close" aria-label="Close">✕</button>
      </div>
      <div class="player-frame-wrap">
        <iframe id="playerFrame" class="player-frame"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
      </div>
      <div id="playerMeta" class="player-meta"></div>
    </div>
  </div>

  <script type="module" src="js/graph.js"></script>
</body>
</html>
